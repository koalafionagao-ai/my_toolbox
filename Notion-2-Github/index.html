<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion 博客转换工具 (精简版)</title>
    <!-- 引入 JSZip 库用于在浏览器端解压 ZIP 文件 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- 引入 Tailwind CSS 用于快速美化界面 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 简单的拖拽高亮样式 */
        .dragover {
            border-color: #3b82f6 !important;
            background-color: #eff6ff !important;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen p-8 relative">

    <!-- 中英文切换按钮 -->
    <div class="absolute top-6 right-6">
        <button id="langToggle" class="bg-white border border-gray-300 hover:bg-gray-100 text-gray-700 px-3 py-1.5 rounded-lg text-sm transition font-medium shadow-sm flex items-center">
            <svg class="w-4 h-4 mr-1.5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path></svg>
            <span id="langToggleText" data-i18n="langBtn">English</span>
        </button>
    </div>

    <div class="max-w-5xl mx-auto space-y-8 mt-4">
        <!-- 头部信息 -->
        <div class="text-center">
            <h1 class="text-3xl font-bold text-gray-900" data-i18n="mainTitle">Notion 导出包转换工具</h1>
            <p class="text-gray-500 mt-2" data-i18n="subTitle">纯本地运行。原封不动保留 Notion 原始代码，仅批量替换图片路径。</p>
        </div>

        <!-- 第一步：配置路径 -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-xl font-semibold mb-4 text-gray-800 flex items-center">
                <span class="bg-blue-100 text-blue-600 rounded-full w-8 h-8 flex-shrink-0 flex items-center justify-center mr-3">1</span>
                <span data-i18n="step1Title">配置你的 GitHub Pages 图片路径</span>
            </h2>
            <div class="flex flex-col space-y-2">
                <label for="imagePath" class="text-sm text-gray-600">
                    <span data-i18n="step1Label">你需要将图片推送到 GitHub 的哪个目录下？</span><br>
                <span class="text-red-500 font-medium" data-i18n="step1WarnReq">⚠️ 强烈建议使用以 / 开头的绝对路径</span> 
            </label>
            <input type="text" id="imagePath" value="/my_blogs/" data-i18n="step1Placeholder" placeholder="例如: /my_blogs/" class="border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 w-full transition-colors">
            <div id="pathWarning" class="hidden text-xs text-orange-600 mt-1 bg-orange-50 p-2 rounded border border-orange-200 w-full" data-i18n="pathWarning">
                💡 检测到您使用了相对路径 (以 <code>.</code> 开头)。如果您的文章在多级目录下，极易导致图片裂开。建议改为以 <code>/</code> 开头的绝对路径。
            </div>
        </div>
    </div>

    <!-- 第二步：上传文件 -->
    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
        <h2 class="text-xl font-semibold mb-4 text-gray-800 flex items-center">
            <span class="bg-blue-100 text-blue-600 rounded-full w-8 h-8 flex-shrink-0 flex items-center justify-center mr-3">2</span>
            <span data-i18n="step2Title">拖拽 Notion 导出的 ZIP 或 HTML 文件</span>
        </h2>
        
        <div id="dropZone" class="border-2 border-dashed border-gray-300 rounded-xl p-10 text-center cursor-pointer transition-colors duration-200 hover:bg-gray-50 flex flex-col items-center justify-center">
            <svg class="w-12 h-12 text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
            <p class="text-gray-600 mb-2" data-i18n="dropText">将 Notion 导出的 <strong>.zip</strong> 或 <strong>.html</strong> 文件拖拽到这里</p>
            <p class="text-sm text-gray-400" data-i18n="browseText">或者点击选择文件</p>
            <input type="file" id="fileInput" accept=".zip,.html,.htm" class="hidden">
        </div>
        
        <!-- 动态展示当前已加载的文件及重新处理按钮 -->
        <div id="fileInfoArea" class="hidden mt-4 flex items-center justify-between bg-blue-50 border border-blue-200 p-3 rounded-lg transition-all">
            <div class="flex items-center text-sm text-blue-800 overflow-hidden pr-2">
                <svg class="w-5 h-5 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                <span data-i18n="currentFileLabel" class="font-medium mr-2 whitespace-nowrap">当前文件:</span>
                <span id="currentFileName" class="truncate font-mono font-semibold"></span>
            </div>
            <button id="reprocessBtn" class="flex-shrink-0 bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-md text-sm font-medium transition shadow-sm" data-i18n="reprocessBtn">
                🔄 重新处理
            </button>
        </div>

        <!-- 处理状态提示 -->
            <div id="statusMsg" class="mt-4 text-center hidden text-sm font-medium"></div>
        </div>

        <!-- 第三步：获取结果 -->
        <div id="resultSection" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 hidden opacity-0 transition-opacity duration-500">
            <h2 class="text-xl font-semibold mb-4 text-gray-800 flex items-center">
                <span class="bg-green-100 text-green-600 rounded-full w-8 h-8 flex-shrink-0 flex items-center justify-center mr-3">3</span>
                <span data-i18n="step3Title">处理完成！</span>
            </h2>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- HTML 代码区 (占 2/3 宽度) -->
                <div class="flex flex-col h-full md:col-span-2">
                    <div class="flex justify-between items-center mb-2">
                        <label class="font-medium text-gray-700" data-i18n="htmlLabel">处理后的完整 HTML 代码：</label>
                        <div class="space-x-2 flex">
                            <button id="previewBtn" class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-3 py-1 rounded text-sm transition font-medium" data-i18n="previewBtn">👁️ 预览样式</button>
                            <button id="copyBtn" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded text-sm transition font-medium" data-i18n="copyBtn">📋 复制全部</button>
                        </div>
                    </div>
                    <textarea id="outputHtml" readonly class="w-full flex-grow border border-gray-300 rounded-lg p-4 bg-gray-50 font-mono text-xs focus:outline-none min-h-[350px] resize-y"></textarea>
                    <p class="text-xs text-gray-500 mt-2" data-i18n="htmlHint">* 严格保留了原 HTML 的所有标签和结构，仅对图径进行了替换操作。</p>
                </div>

                <!-- 替换图片清单区 (占 1/3 宽度) -->
                <div class="flex flex-col h-full bg-green-50/50 border border-green-100 rounded-lg p-4">
                    <h3 class="text-sm font-bold text-green-800 mb-3 flex items-center border-b border-green-200 pb-2">
                        <svg class="w-5 h-5 text-green-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span data-i18n="listTitle">成功替换路径的图片</span>
                    </h3>
                    <ul id="replacedImageList" class="overflow-y-auto flex-grow max-h-[320px] pr-2 space-y-2">
                        <!-- 动态注入的图片列表 -->
                    </ul>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- 国际化 (i18n) 字典 ---
        const i18n = {
            zh: {
                pageTitle: "Notion 博客转换工具 (精简版)",
                langBtn: "English",
                mainTitle: "Notion 导出包转换工具",
                subTitle: "纯本地运行。原封不动保留 Notion 原始代码，仅批量替换图片路径。",
                step1Title: "配置你的 GitHub Pages 图片路径",
                step1Label: "你需要将图片推送到 GitHub 的哪个目录下？",
                step1WarnReq: "⚠️ 强烈建议使用以 / 开头的绝对路径",
                step1Placeholder: "例如: /my_blogs/",
                pathWarning: "💡 警告：您的路径没有以 <code>/</code> 开头！这会导致链接叠加（如 my_blogs/.../my_blogs/...）。处理时系统会自动尝试在开头补 <code>/</code>。",
                step2Title: "拖拽 Notion 导出的 ZIP 或 HTML 文件",
                dropText: "将 Notion 导出的 <strong>.zip</strong> 或 <strong>.html</strong> 文件拖拽到这里",
                browseText: "或者点击选择文件",
                step3Title: "处理完成！",
                htmlLabel: "处理后的完整 HTML 代码：",
                previewBtn: "👁️ 预览样式",
                copyBtn: "📋 复制全部",
                htmlHint: "* 严格保留了原 HTML 的所有标签和结构，仅对图径进行了替换操作。",
                listTitle: "成功替换路径的图片",
                currentFileLabel: "当前文件:",
                reprocessBtn: "🔄 重新处理",
                // 动态文本
                errNotZip: "请上传 Notion 导出的 .zip 或 .html 文件！",
                parsing: "正在解析中，请稍候...",
                hintFormat: "请确保在 Notion 导出时，<strong>导出格式选择了 \"HTML\"</strong>。",
                errMd: "🔴 <strong>检测到 Markdown (.md) 文件！</strong><br>您似乎使用了 Markdown 格式导出。请回到 Notion，在导出选项中将格式切换为 <strong>HTML</strong> 再试一次。",
                errNoHtmlTitle: "解析失败：未找到 HTML 文件",
                noImages: "文章中未发现需要替换路径的本地图片。",
                success: "处理成功！",
                errParse: "解析失败，请确保这是 Notion 原生导出的有效 HTML 压缩包或文件。",
                copied: "✅ 已复制！",
                pathUpdated: "✅ 路径已改: ",
                deepExtract: "📦 [穿透解压]"
            },
            en: {
                pageTitle: "Notion Blog Converter (Lite)",
                langBtn: "中文",
                mainTitle: "Notion Export Converter",
                subTitle: "100% Local. Preserves original Notion HTML, only batch replaces image paths.",
                step1Title: "Configure GitHub Pages Image Path",
                step1Label: "Where will your images be hosted on GitHub?",
                step1WarnReq: "⚠️ Highly recommended to use an absolute path starting with /",
                step1Placeholder: "e.g., /my_blogs/",
                pathWarning: "💡 Warning: Path does not start with <code>/</code>! This will cause duplicated paths. The system will auto-prepend a <code>/</code> during processing.",
                step2Title: "Drag & Drop Notion ZIP or HTML Export",
                dropText: "Drop your Notion <strong>.zip</strong> or <strong>.html</strong> file here",
                browseText: "or click to select file",
                step3Title: "Processing Complete!",
                htmlLabel: "Processed Full HTML Code:",
                previewBtn: "👁️ Preview",
                copyBtn: "📋 Copy All",
                htmlHint: "* Original HTML structure is strictly preserved. Only image paths are modified.",
                listTitle: "Successfully Replaced Images",
                currentFileLabel: "Current File:",
                reprocessBtn: "🔄 Re-process",
                // Dynamic Text
                errNotZip: "Please upload a valid Notion .zip or .html export!",
                parsing: "Parsing, please wait...",
                hintFormat: "Please ensure you selected <strong>\"HTML\"</strong> as the export format in Notion.",
                errMd: "🔴 <strong>Markdown (.md) detected!</strong><br>It seems you exported as Markdown. Please go back to Notion and export as HTML.",
                errNoHtmlTitle: "Parsing Failed: No HTML file found",
                noImages: "No local images requiring path replacement were found in this article.",
                success: "Success!",
                errParse: "Parsing failed. Ensure this is a valid Notion HTML export ZIP or File.",
                copied: "✅ Copied!",
                pathUpdated: "✅ Path updated: ",
                deepExtract: "📦 [Deep Extract]"
            }
        };

        let currentLang = 'zh';
        let currentLoadedFile = null; // 新增全局变量存储当前文件

        function t(key) {
            return i18n[currentLang][key];
        }

        function setLang(lang) {
            currentLang = lang;
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
            document.title = t('pageTitle');
            
            // 更新静态 DOM 节点
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) {
                    if (el.tagName === 'INPUT' && el.hasAttribute('placeholder')) {
                        el.placeholder = i18n[lang][key];
                    } else {
                        el.innerHTML = i18n[lang][key];
                    }
                }
            });
        }

        document.getElementById('langToggle').addEventListener('click', () => {
            setLang(currentLang === 'zh' ? 'en' : 'zh');
        });

        // --- 核心逻辑 ---
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const statusMsg = document.getElementById('statusMsg');
        const resultSection = document.getElementById('resultSection');
        const imagePathInput = document.getElementById('imagePath');
        const pathWarning = document.getElementById('pathWarning');
        const fileInfoArea = document.getElementById('fileInfoArea');
        const currentFileName = document.getElementById('currentFileName');
        const reprocessBtn = document.getElementById('reprocessBtn');

        // 监听重新处理按钮
        reprocessBtn.addEventListener('click', () => {
            if (currentLoadedFile) {
                handleFile(currentLoadedFile);
            }
        });

        // 监听路径输入，给出智能提示 (防呆设计)
        imagePathInput.addEventListener('input', (e) => {
            const val = e.target.value.trim();
            // 如果不为空，且不以 / 开头，也不以 http 开头，也不以 . 开头，则警告
            if (val !== '' && !val.startsWith('/') && !val.startsWith('http') && !val.startsWith('.')) {
                pathWarning.classList.remove('hidden');
                imagePathInput.classList.add('border-orange-400', 'ring-orange-200');
            } else {
                pathWarning.classList.add('hidden');
                imagePathInput.classList.remove('border-orange-400', 'ring-orange-200');
            }
        });
        
        // 点击触发文件选择
        dropZone.addEventListener('click', () => fileInput.click());

        // 处理文件拖拽样式
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // 监听文件选择
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        });

        // 核心处理逻辑
        async function handleFile(file) {
            // 保存并展示当前文件信息
            currentLoadedFile = file;
            currentFileName.textContent = file.name;
            fileInfoArea.classList.remove('hidden');

            const fileNameLower = file.name.toLowerCase();
            if (!fileNameLower.endsWith('.zip') && !fileNameLower.endsWith('.html') && !fileNameLower.endsWith('.htm')) {
                showStatus('errNotZip', 'text-red-600');
                return;
            }

            showStatus('parsing', 'text-blue-600');
            resultSection.classList.add('hidden');
            resultSection.classList.remove('opacity-100');

            try {
                let htmlContent = '';
                const allFiles = []; // 记录包内所有文件以供调试
                
                if (fileNameLower.endsWith('.zip')) {
                    const zip = new JSZip();
                    const loadedZip = await zip.loadAsync(file);
                    const htmlContents = []; // 暂存找到的所有 HTML

                    // 递归处理文件（支持嵌套 ZIP 套娃解析）
                    async function processEntry(relativePath, zipEntry) {
                        if (zipEntry.dir) return;

                        // 忽略 Mac 的隐藏缓存文件夹 (__MACOSX) 以及以 . 开头的系统隐藏文件
                        if (relativePath.includes('__MACOSX') || relativePath.split('/').pop().startsWith('.')) {
                            return;
                        }

                        const lowerPath = relativePath.toLowerCase().trim();

                        // 处理 Notion 的 Part-1.zip 嵌套情况
                        if (lowerPath.endsWith('.zip')) {
                            allFiles.push(`${t('deepExtract')} ${relativePath}`);
                            const nestedBlob = await zipEntry.async("blob");
                            const nestedZip = new JSZip();
                            const loadedNested = await nestedZip.loadAsync(nestedBlob);
                            for (const [nestedPath, nestedEntry] of Object.entries(loadedNested.files)) {
                                // 递归调用自身去解析内层文件
                                await processEntry(nestedPath, nestedEntry);
                            }
                            return;
                        }

                        allFiles.push(relativePath);

                        if (lowerPath.endsWith('.html') || lowerPath.endsWith('.htm')) {
                            const content = await zipEntry.async("string");
                            htmlContents.push(content);
                        }
                    }

                    // 从最外层开始遍历并递归解析
                    for (const [relativePath, zipEntry] of Object.entries(loadedZip.files)) {
                        await processEntry(relativePath, zipEntry);
                    }

                    // 智能提取：取出内容最长的 HTML（主页面）
                    for (const content of htmlContents) {
                        if (content.length > htmlContent.length) {
                            htmlContent = content;
                        }
                    }
                } else {
                    // 直接处理 HTML 文件
                    allFiles.push(file.name);
                    htmlContent = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = e => resolve(e.target.result);
                        reader.onerror = e => reject(e);
                        reader.readAsText(file);
                    });
                }

                if (!htmlContent) {
                    console.log("ZIP Contents:", allFiles);
                    
                    let hintKey = 'hintFormat';
                    if (allFiles.some(f => f.toLowerCase().endsWith('.md'))) {
                        hintKey = 'errMd';
                    }

                    const debugHtml = `
                        <div class="bg-red-50 border border-red-200 p-4 rounded-lg text-left shadow-sm">
                            <div class="text-red-700 font-bold mb-2 flex items-center">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                <span data-i18n="errNoHtmlTitle">${t('errNoHtmlTitle')}</span>
                            </div>
                            <div class="text-gray-700 text-sm mb-3" data-i18n="${hintKey}">${t(hintKey)}</div>
                        </div>
                    `;
                    
                    statusMsg.removeAttribute('data-i18n'); // 移除单行文本的翻译绑定
                    statusMsg.innerHTML = debugHtml;
                    statusMsg.className = `mt-4`;
                    statusMsg.classList.remove('hidden');
                    return;
                }

                // --- 处理 HTML 代码 (仅替换图片路径) ---
                let imagePathPrefix = document.getElementById('imagePath').value.trim() || '/images/';
                
                // 【终极防呆】：如果用户忘记写开头的 /，自动帮他补上，防止相对路径无限叠加
                if (imagePathPrefix && !imagePathPrefix.startsWith('/') && !imagePathPrefix.startsWith('.') && !imagePathPrefix.startsWith('http')) {
                    imagePathPrefix = '/' + imagePathPrefix;
                }
                
                // 确保路径以 / 结尾
                const finalPrefix = imagePathPrefix.endsWith('/') ? imagePathPrefix : imagePathPrefix + '/';

                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlContent, "text/html");
                
                const replacedImages = []; // 用于记录被替换的图片名称

                // 寻找并替换所有图片路径
                const images = doc.querySelectorAll('img');
                images.forEach(img => {
                    const src = img.getAttribute('src');
                    // 忽略已经是网络绝对路径，或者 base64 的图片
                    if (src && !src.startsWith('http') && !src.startsWith('data:')) {
                        let fileName = '';
                        try {
                            // 尝试解码文件名 (例如处理 %20 空格等)
                            fileName = decodeURIComponent(src.split('/').pop());
                        } catch(e) {
                            // 如果解码失败，直接使用原始文件名
                            fileName = src.split('/').pop();
                        }
                        
                        const newPath = finalPrefix + fileName;
                        img.setAttribute('src', newPath);
                        replacedImages.push(fileName);
                        
                        // 【核心修复】Notion 会把图片包裹在一个 <a> 标签里用于点击放大，必须同时替换 <a> 的 href
                        const parentElement = img.parentElement;
                        if (parentElement && parentElement.tagName.toLowerCase() === 'a') {
                            const href = parentElement.getAttribute('href');
                            if (href && !href.startsWith('http') && !href.startsWith('data:')) {
                                parentElement.setAttribute('href', newPath);
                            }
                        }
                    }
                });

                // --- 【新功能】优化属性表格样式和中英文化 ---
                const propertiesTable = doc.querySelector('table.properties');
                if (propertiesTable) {
                    let createdTimeHtml = '';
                    let updatedTimeHtml = '';
                    let tagsHtml = '';

                    // 提取并转换时间的辅助函数
                    function formatNotionDate(dateStr) {
                        if (!dateStr) return '';
                        let cleanStr = dateStr.replace('@', '').trim();
                        // 匹配中文格式: 2026年3月13日 14:58
                        const zhRegex = /(\d{4})\s*年\s*(\d{1,2})\s*月\s*(\d{1,2})\s*日\s*(\d{1,2}:\d{2})/;
                        const zhMatch = cleanStr.match(zhRegex);
                        if (zhMatch) {
                            return `${zhMatch[1]}-${zhMatch[2].padStart(2, '0')}-${zhMatch[3].padStart(2, '0')} ${zhMatch[4]}`;
                        }
                        // 如果是英文或其它格式，尝试原生解析
                        const parsed = new Date(cleanStr);
                        if (!isNaN(parsed)) {
                            return `${parsed.getFullYear()}-${String(parsed.getMonth() + 1).padStart(2, '0')}-${String(parsed.getDate()).padStart(2, '0')} ${String(parsed.getHours()).padStart(2, '0')}:${String(parsed.getMinutes()).padStart(2, '0')}`;
                        }
                        return cleanStr;
                    }

                    // 遍历原始表格提取内容
                    propertiesTable.querySelectorAll('.property-row').forEach(row => {
                        const th = row.querySelector('th');
                        const td = row.querySelector('td');
                        if (!th || !td) return;

                        const label = th.textContent.toLowerCase();
                        const rawText = td.textContent;

                        if (label.includes('创建') || label.includes('created') || row.classList.contains('property-row-created_time')) {
                            createdTimeHtml = formatNotionDate(rawText);
                        } else if (label.includes('更新') || label.includes('edited') || label.includes('updated') || row.classList.contains('property-row-last_edited_time')) {
                            updatedTimeHtml = formatNotionDate(rawText);
                        } else if (label.includes('标签') || label.includes('tag') || row.classList.contains('property-row-multi_select')) {
                            tagsHtml = td.innerHTML;
                        }
                    });

                    // 判断语言环境 (依据填写的路径是否包含 /en/)
                    const isEn = imagePathPrefix.includes('/en/');
                    const labelCreated = isEn ? 'Created' : '创建时间';
                    const labelTags = isEn ? 'Tags' : '标签';
                    const labelUpdated = isEn ? 'Updated' : '上次更新时间';

                    // 生成横向优雅排版 (内联样式保证跨平台兼容)
                    const newPropsHtml = `
                        <div class="elegant-properties" style="display: flex; flex-direction: column; gap: 0.75rem; font-size: 0.875rem; color: #6b7280; padding: 1.25rem 0; border-bottom: 1px solid #f3f4f6; margin-bottom: 2rem; font-family: ui-sans-serif, system-ui, sans-serif;">
                            ${tagsHtml ? `
                            <div class="prop-row-tags" style="display: flex; align-items: center; gap: 0.5rem;">
                                <svg style="width: 16px; height: 16px; opacity: 0.6;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path></svg>
                                <span class="prop-label" style="font-weight: 500; color: #4b5563;">${labelTags}:</span>
                                <div class="prop-tags" style="display: flex; flex-wrap: wrap; gap: 0.35rem; align-items: center;">
                                    ${tagsHtml}
                                </div>
                            </div>` : ''}

                            <div class="prop-row-times" style="display: flex; flex-wrap: wrap; gap: 1.5rem;">
                                ${createdTimeHtml ? `
                                <div class="prop-item" style="display: flex; align-items: center; gap: 0.5rem;">
                                    <svg style="width: 16px; height: 16px; opacity: 0.6;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                    <span class="prop-label" style="font-weight: 500; color: #4b5563;">${labelCreated}:</span>
                                    <span class="prop-value" style="color: #1f2937;">${createdTimeHtml}</span>
                                </div>` : ''}

                                ${updatedTimeHtml ? `
                                <div class="prop-item" style="display: flex; align-items: center; gap: 0.5rem;">
                                    <svg style="width: 16px; height: 16px; opacity: 0.6;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    <span class="prop-label" style="font-weight: 500; color: #4b5563;">${labelUpdated}:</span>
                                    <span class="prop-value" style="color: #1f2937;">${updatedTimeHtml}</span>
                                </div>` : ''}
                            </div>
                        </div>
                    `;

                    // 创建一个临时元素，并将新的优雅布局替换掉原来的 table.properties
                    const tempDiv = doc.createElement('div');
                    tempDiv.innerHTML = newPropsHtml.trim();
                    propertiesTable.parentNode.replaceChild(tempDiv.firstChild, propertiesTable);
                }

                // 还原为完整的 HTML 字符串（包括 <html>, <head>, <body> 等所有原生结构）
                const finalHtml = "<!DOCTYPE html>\n" + doc.documentElement.outerHTML;
                document.getElementById('outputHtml').value = finalHtml;

                // --- 渲染成功替换的图片清单 ---
                const imageListContainer = document.getElementById('replacedImageList');
                if (replacedImages.length > 0) {
                    imageListContainer.innerHTML = replacedImages.map(name => `
                        <li class="flex items-start text-sm text-gray-700 bg-white p-2 rounded border border-green-100 shadow-sm">
                            <svg class="w-4 h-4 text-green-500 mr-2 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            <span class="break-all">${name}</span>
                        </li>
                    `).join('');
                } else {
                    imageListContainer.innerHTML = `
                        <li class="text-sm text-gray-500 italic p-2 text-center" data-i18n="noImages">
                            ${t('noImages')}
                        </li>
                    `;
                }

                // 展现结果
                showStatus('success', 'text-green-600');
                resultSection.classList.remove('hidden');
                // 延迟添加 opacity 触发淡入动画
                setTimeout(() => resultSection.classList.add('opacity-100'), 50);

            } catch (error) {
                console.error("解析过程中遇到错误:", error);
                showStatus('errParse', 'text-red-600');
            }
        }

        function showStatus(msgKey, colorClass) {
            statusMsg.setAttribute('data-i18n', msgKey);
            statusMsg.innerHTML = t(msgKey);
            statusMsg.className = `mt-4 text-center text-sm font-medium ${colorClass}`;
            statusMsg.classList.remove('hidden');
        }

        // 复制代码功能
        document.getElementById('copyBtn').addEventListener('click', function() {
            const textarea = document.getElementById('outputHtml');
            textarea.select();
            document.execCommand('copy');
            
            const originalI18n = this.getAttribute('data-i18n');
            this.setAttribute('data-i18n', 'copied');
            this.innerHTML = t('copied');
            this.classList.add('bg-green-100', 'text-green-700');
            
            setTimeout(() => {
                this.setAttribute('data-i18n', originalI18n);
                this.innerHTML = t(originalI18n);
                this.classList.remove('bg-green-100', 'text-green-700');
            }, 2000);
        });

        // 预览功能
        document.getElementById('previewBtn').addEventListener('click', function() {
            const htmlContent = document.getElementById('outputHtml').value;
            if (!htmlContent) return;
            
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlContent, "text/html");
            
            // 因为在 Blob URL 中，本地相对路径必定裂图。
            // 现在的做法：在预览前，直接遍历 DOM 把需要预览的图片替换为占位图。
            doc.querySelectorAll('img').forEach(img => {
                const src = img.getAttribute('src');
                if (src && !src.startsWith('http') && !src.startsWith('data:')) {
                    const msg = t('pathUpdated') + src;
                    img.setAttribute('title', msg);
                    img.setAttribute('alt', msg);
                    
                    const svgStr = `<svg xmlns='http://www.w3.org/2000/svg' width='100%' height='100%' style='background:#f3f4f6; border: 2px dashed #10b981; min-height: 40px; min-width: 40px;'><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='12px' fill='#047857'>${msg}</text></svg>`;
                    img.setAttribute('src', 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr));

                    // 预览时移除外层 <a> 标签的跳转，防止误触打开旧链接
                    const parentElement = img.parentElement;
                    if (parentElement && parentElement.tagName.toLowerCase() === 'a') {
                        parentElement.removeAttribute('href');
                        parentElement.style.cursor = 'default';
                    }
                }
            });
            
            const finalPreviewHtml = "<!DOCTYPE html>\n" + doc.documentElement.outerHTML;
            const blob = new Blob([finalPreviewHtml], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank');
        });
    </script>
</body>
</html>
