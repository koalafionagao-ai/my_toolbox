<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion 博客转换工具 (全能极客版)</title>
    <!-- 引入 JSZip 库用于处理压缩包 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- 引入 Tailwind CSS 用于工具界面美化 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dragover { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
        /* 隐藏滚动条但保留功能 */
        #replacedImageList::-webkit-scrollbar { width: 4px; }
        #replacedImageList::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        /* 画廊箭头过渡 */
        .gallery-nav-btn { transition: transform 0.2s, opacity 0.2s; opacity: 0.6; }
        .gallery-nav-btn:hover { transform: scale(1.2); opacity: 1; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen p-8 relative">

    <!-- 顶部工具语言切换 (极简文字链样式) -->
    <div class="absolute top-6 right-6">
        <button id="langToggle" class="text-gray-500 hover:text-blue-600 transition font-medium text-sm flex items-center gap-1.5 p-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
            <span id="langToggleText" data-i18n="langBtn">English</span>
        </button>
    </div>

    <div class="max-w-5xl mx-auto space-y-8 mt-4">
        <!-- 头部 -->
        <div class="text-center">
            <h1 class="text-3xl font-bold text-gray-900" data-i18n="mainTitle">Notion 导出包转换工具</h1>
            <p class="text-gray-500 mt-2" data-i18n="subTitle">支持代码高亮、Meta排版、CDN加速、智能 WebP 压缩及懒加载。</p>
        </div>

        <!-- 第一步 -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-xl font-semibold mb-4 text-gray-800 flex items-center">
                <span class="bg-blue-100 text-blue-600 rounded-full w-8 h-8 flex-shrink-0 flex items-center justify-center mr-3">1</span>
                <span data-i18n="step1Title">配置统一图片路径与 CDN 加速</span>
            </h2>
            
            <!-- GitHub 账号信息用于原生 CDN 构建 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div class="flex flex-col space-y-1.5">
                    <label for="githubUser" class="text-sm text-gray-600 font-medium" data-i18n="step1GithubUser">GitHub 用户名</label>
                    <input type="text" id="githubUser" value="koalafionagao-ai" class="border border-gray-300 rounded-lg p-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 w-full transition-colors">
                </div>
                <div class="flex flex-col space-y-1.5">
                    <label for="githubRepo" class="text-sm text-gray-600 font-medium" data-i18n="step1GithubRepo">仓库名称</label>
                    <input type="text" id="githubRepo" value="my_blogs" class="border border-gray-300 rounded-lg p-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 w-full transition-colors">
                </div>
            </div>

            <div class="flex flex-col space-y-1.5">
                <label for="imagePath" class="text-sm text-gray-600">
                    <span data-i18n="step1Label">你需要将图片推送到仓库的哪个路径下？（此项用于统一替换本地图片路径并拼接 CDN）</span><br>
                    <span class="text-blue-500 font-medium" data-i18n="step1WarnReq">💡 例如直接填入 /my_blogs/ 或 /images/</span> 
                </label>
                <input type="text" id="imagePath" value="/my_blogs/" data-i18n="step1Placeholder" placeholder="例如: /my_blogs/" class="border border-gray-300 rounded-lg p-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 w-full transition-colors">
                <div id="pathWarning" class="hidden text-xs text-orange-600 mt-1 bg-orange-50 p-2 rounded border border-orange-200 w-full" data-i18n="pathWarning">
                    ⚠️ 您的路径没有以 <code>/</code> 开头！系统会自动在开头补齐。
                </div>
            </div>
        </div>

        <!-- 第二步 -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-xl font-semibold mb-4 text-gray-800 flex items-center">
                <span class="bg-blue-100 text-blue-600 rounded-full w-8 h-8 flex-shrink-0 flex items-center justify-center mr-3">2</span>
                <span data-i18n="step2Title">拖拽 Notion 导出的 ZIP 或 HTML 文件</span>
            </h2>
            <div id="dropZone" class="border-2 border-dashed border-gray-300 rounded-xl p-10 text-center cursor-pointer transition-colors duration-200 hover:bg-gray-50 flex flex-col items-center justify-center">
                <svg class="w-12 h-12 text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                <p class="text-gray-600 mb-2" data-i18n="dropText">将 Notion 导出的 <strong>.zip</strong> 或 <strong>.html</strong> 文件拖拽到这里</p>
                <p class="text-sm text-gray-400" data-i18n="browseText">或者点击选择文件</p>
                <input type="file" id="fileInput" accept=".zip,.html,.htm" class="hidden">
            </div>
            <div id="fileInfoArea" class="hidden mt-4 flex items-center justify-between bg-blue-50 border border-blue-200 p-3 rounded-lg transition-all">
                <div class="flex items-center text-sm text-blue-800 overflow-hidden pr-2">
                    <svg class="w-5 h-5 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <span data-i18n="currentFileLabel" class="font-medium mr-2 whitespace-nowrap">当前文件:</span>
                    <span id="currentFileName" class="truncate font-mono font-semibold"></span>
                </div>
                <button id="reprocessBtn" class="flex-shrink-0 bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-md text-sm font-medium transition shadow-sm" data-i18n="reprocessBtn">🔄 重新处理</button>
            </div>
            <div id="statusMsg" class="mt-4 text-center hidden text-sm font-medium"></div>
        </div>

        <!-- 第三步 -->
        <div id="resultSection" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 hidden opacity-0 transition-opacity duration-500">
            <h2 class="text-xl font-semibold mb-4 text-gray-800 flex items-center">
                <span class="bg-green-100 text-green-600 rounded-full w-8 h-8 flex-shrink-0 flex items-center justify-center mr-3">3</span>
                <span data-i18n="step3Title">处理完成！</span>
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- HTML 结果区 -->
                <div class="flex flex-col h-full md:col-span-2">
                    <div class="flex justify-between items-center mb-2">
                        <label class="font-medium text-gray-700" data-i18n="htmlLabel">已完成样式模板化、CDN 注入与懒加载优化的 HTML：</label>
                        <div class="space-x-2 flex">
                            <button id="previewBtn" class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-3 py-1 rounded text-sm transition font-medium" data-i18n="previewBtn">👁️ 预览样式</button>
                            <button id="copyBtn" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded text-sm transition font-medium" data-i18n="copyBtn">📋 复制全部</button>
                        </div>
                    </div>
                    <textarea id="outputHtml" readonly class="w-full flex-grow border border-gray-300 rounded-lg p-4 bg-gray-50 font-mono text-xs focus:outline-none min-h-[350px] resize-y"></textarea>
                </div>
                <!-- 压缩图片列表区 -->
                <div class="flex flex-col h-full bg-green-50/50 border border-green-100 rounded-lg p-4">
                    <div class="flex justify-between items-center mb-3 border-b border-green-200 pb-2">
                        <h3 class="text-sm font-bold text-green-800 flex items-center">
                            <svg class="w-5 h-5 text-green-600 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            <span data-i18n="listTitle">图片路径替换与 WebP 压缩包</span>
                        </h3>
                        <div class="space-x-1.5 flex">
                            <button id="previewWebpBtn" onclick="openGallery(0)" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-2 py-1 rounded text-xs transition font-medium shadow-sm items-center hidden" data-i18n="previewWebpBtn">🖼️ 预览</button>
                            <button id="downloadWebpBtn" class="bg-green-600 hover:bg-green-700 text-white px-2 py-1 rounded text-xs transition font-medium shadow-sm items-center hidden" data-i18n="downloadWebpBtn">📦 下载</button>
                        </div>
                    </div>
                    <ul id="replacedImageList" class="overflow-y-auto flex-grow max-h-[320px] pr-2 space-y-2"></ul>
                </div>
            </div>
        </div>
    </div>

    <!-- 🖼️ 沉浸式图片画廊弹窗 -->
    <div id="galleryModal" class="fixed inset-0 bg-black/95 z-50 hidden flex-col items-center justify-center backdrop-blur-sm transition-opacity">
        <button onclick="closeGallery()" class="absolute top-5 right-6 text-white text-4xl hover:text-red-400 transition">&times;</button>
        
        <div class="absolute top-6 left-6 text-white/90 text-sm md:text-base font-medium flex flex-col gap-1">
            <span id="galleryTitle" class="bg-gray-800/60 px-3 py-1.5 rounded-lg border border-gray-600/50"></span>
            <span id="galleryProgress" class="text-gray-400 font-mono pl-1"></span>
        </div>
        
        <div class="flex items-center justify-between w-full max-w-6xl px-4 md:px-12 mt-8">
            <button onclick="prevGalleryImage()" class="gallery-nav-btn text-white text-6xl hover:text-blue-400 p-4 focus:outline-none">&lsaquo;</button>
            
            <div class="relative group flex items-center justify-center h-[75vh] w-full mx-4">
                <img id="galleryImage" src="" class="max-h-full max-w-full object-contain rounded-lg shadow-2xl transition-transform duration-300">
            </div>
            
            <button onclick="nextGalleryImage()" class="gallery-nav-btn text-white text-6xl hover:text-blue-400 p-4 focus:outline-none">&rsaquo;</button>
        </div>
    </div>

    <script>
        const i18n = {
            zh: {
                pageTitle: "Notion 博客转换工具 (全能极客版)",
                langBtn: "English",
                mainTitle: "Notion 导出包转换工具",
                subTitle: "支持代码高亮、Meta排版、CDN加速、智能 WebP 压缩及懒加载。",
                step1Title: "配置统一图片路径与 CDN 加速",
                step1GithubUser: "GitHub 用户名",
                step1GithubRepo: "仓库名称",
                step1Label: "你需要将图片推送到仓库的哪个路径下？（此项用于统一替换本地图片路径并拼接 CDN）",
                step1WarnReq: "💡 例如直接填入 /my_blogs/ 或 /images/",
                step1Placeholder: "例如: /my_blogs/",
                pathWarning: "⚠️ 您的路径没有以 / 开头！系统会自动在开头补齐。",
                step2Title: "拖拽 Notion 导出的 ZIP 或 HTML 文件",
                dropText: "将 Notion 导出的 .zip 或 .html 文件拖拽到这里",
                browseText: "或者点击选择文件",
                step3Title: "处理完成！",
                htmlLabel: "已完成样式模板化、CDN 注入与懒加载优化的 HTML：",
                previewBtn: "👁️ 预览样式",
                copyBtn: "📋 复制全部",
                listTitle: "图片路径替换与 WebP 压缩包",
                previewWebpBtn: "🖼️ 预览",
                downloadWebpBtn: "📦 下载包",
                currentFileLabel: "当前文件:",
                reprocessBtn: "🔄 重新处理",
                errNotZip: "请上传 Notion 导出的 .zip 或 .html 文件！",
                parsing: "正在解析文件...",
                compressing: "⚙️ 正在启动极速画质压缩引擎并转换 WebP...",
                errNoHtmlTitle: "解析失败：未找到 HTML 文件",
                success: "处理成功！HTML与资源链接已就绪。",
                errParse: "解析失败，请确保文件有效。",
                copied: "✅ 已复制到剪贴板！",
                pathUpdated: "✅ 路径已改: ",
                noImages: "这篇文章是纯文本，没有发现任何图片。",
                pathReplacedItem: "HTML 中的原路径已统一替换为 CDN 链接"
            },
            en: {
                pageTitle: "Notion Blog Converter (Pro)",
                langBtn: "中文",
                mainTitle: "Notion Export Converter",
                subTitle: "Geek highlights, Meta format, CDN accel, WebP compression & Lazy Load.",
                step1Title: "Configure Unified Image Path & CDN",
                step1GithubUser: "GitHub Username",
                step1GithubRepo: "Repository Name",
                step1Label: "Where will you push images in your repo? (Used to replace local paths and build CDN links)",
                step1WarnReq: "💡 e.g., simply enter /my_blogs/ or /images/",
                step1Placeholder: "e.g., /my_blogs/",
                pathWarning: "⚠️ Path does not start with /. Auto-prepending.",
                step2Title: "Drag & Drop Notion ZIP or HTML Export",
                dropText: "Drop your Notion .zip or .html file here",
                browseText: "or click to select file",
                step3Title: "Processing Complete!",
                htmlLabel: "HTML with Template Styling, CDN & Lazy Load:",
                previewBtn: "👁️ Preview",
                copyBtn: "📋 Copy All",
                listTitle: "Path Replacement & WebP Pack",
                previewWebpBtn: "🖼️ Preview",
                downloadWebpBtn: "📦 Download",
                currentFileLabel: "Current File:",
                reprocessBtn: "🔄 Re-process",
                errNotZip: "Please upload a valid .zip or .html export!",
                parsing: "Parsing file...",
                compressing: "⚙️ Compressing and converting to WebP...",
                errNoHtmlTitle: "Parsing Failed: No HTML found",
                success: "Success! HTML & Resources are ready.",
                errParse: "Parsing failed.",
                copied: "✅ Copied to clipboard!",
                pathUpdated: "✅ Path updated: ",
                noImages: "No images found in this article.",
                pathReplacedItem: "Original path in HTML replaced with CDN link"
            }
        };

        let currentLang = 'zh';
        let currentLoadedFile = null; 
        let globalProcessedImages = []; // 存储所有转换好的 WebP 供画廊和下载使用
        let currentGalleryIdx = 0;

        function t(key) { return i18n[currentLang][key]; }

        function setLang(lang) {
            currentLang = lang;
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
            document.title = t('pageTitle');
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) {
                    if (el.tagName === 'INPUT' && el.hasAttribute('placeholder')) el.placeholder = i18n[lang][key];
                    else el.innerHTML = i18n[lang][key];
                }
            });
            // Update dynamically generated list if exists
            document.querySelectorAll('[data-i18n-dynamic="pathReplacedItem"]').forEach(el => {
                el.innerHTML = t('pathReplacedItem');
            });
        }

        document.getElementById('langToggle').addEventListener('click', () => {
            setLang(currentLang === 'zh' ? 'en' : 'zh');
        });

        // --- 画廊互动逻辑 ---
        function openGallery(idx) {
            if (globalProcessedImages.length === 0) return;
            currentGalleryIdx = idx;
            updateGalleryUI();
            const modal = document.getElementById('galleryModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }
        function closeGallery() {
            document.getElementById('galleryModal').classList.add('hidden');
            document.getElementById('galleryModal').classList.remove('flex');
        }
        function nextGalleryImage() {
            if (globalProcessedImages.length === 0) return;
            currentGalleryIdx = (currentGalleryIdx + 1) % globalProcessedImages.length;
            updateGalleryUI();
        }
        function prevGalleryImage() {
            if (globalProcessedImages.length === 0) return;
            currentGalleryIdx = (currentGalleryIdx - 1 + globalProcessedImages.length) % globalProcessedImages.length;
            updateGalleryUI();
        }
        function updateGalleryUI() {
            const imgData = globalProcessedImages[currentGalleryIdx];
            document.getElementById('galleryImage').src = imgData.dataUrl;
            document.getElementById('galleryTitle').innerHTML = `<strong>${imgData.name}</strong> 
                <span class="text-gray-400 ml-2 line-through text-xs">${(imgData.oldSize/1024).toFixed(1)}KB</span> 
                <span class="text-green-400 font-bold ml-1">⬇️ ${(imgData.newSize/1024).toFixed(1)}KB</span>`;
            document.getElementById('galleryProgress').textContent = `IMAGE ${currentGalleryIdx + 1} OF ${globalProcessedImages.length}`;
        }
        document.addEventListener('keydown', (e) => {
            const modal = document.getElementById('galleryModal');
            if (!modal.classList.contains('hidden')) {
                if (e.key === 'ArrowRight') nextGalleryImage();
                if (e.key === 'ArrowLeft') prevGalleryImage();
                if (e.key === 'Escape') closeGallery();
            }
        });

        // --- WebP 下载逻辑 ---
        document.getElementById('downloadWebpBtn').addEventListener('click', async () => {
            if (globalProcessedImages.length === 0) return;
            const zip = new JSZip();
            globalProcessedImages.forEach(img => {
                zip.file(img.name, img.blob);
            });
            const content = await zip.generateAsync({ type: "blob" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(content);
            a.download = "optimized_webp_images.zip";
            a.click();
        });

        // --- 核心转换逻辑：Canvas 压缩 WebP ---
        function compressImageToWebP(blob, originalName) {
            return new Promise((resolve) => {
                const img = new Image();
                const url = URL.createObjectURL(blob);
                img.onload = () => {
                    URL.revokeObjectURL(url);
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    // 限制最大宽高，避免原图过大导致卡顿
                    const MAX_DIM = 1920;
                    if (width > MAX_DIM || height > MAX_DIM) {
                        if (width > height) { height = Math.round(height * (MAX_DIM / width)); width = MAX_DIM; }
                        else { width = Math.round(width * (MAX_DIM / height)); height = MAX_DIM; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // 强力压缩：0.8 是画质与体积的完美平衡点
                    const quality = 0.8;
                    const dataUrl = canvas.toDataURL('image/webp', quality);
                    
                    // 重命名为 .webp
                    const nameParts = originalName.split('.');
                    if (nameParts.length > 1) nameParts.pop();
                    const newName = nameParts.join('.') + '.webp';

                    // DataURL 转 Blob 计算真实大小
                    const arr = dataUrl.split(',');
                    const mime = arr[0].match(/:(.*?);/)[1];
                    const bstr = atob(arr[1]);
                    let n = bstr.length;
                    const u8arr = new Uint8Array(n);
                    while(n--){ u8arr[n] = bstr.charCodeAt(n); }
                    const newBlob = new Blob([u8arr], {type: mime});

                    resolve({ originalName, name: newName, blob: newBlob, dataUrl, oldSize: blob.size, newSize: newBlob.size });
                };
                img.onerror = () => {
                    // 非图片文件（如损坏或纯svg）直接原样返回
                    resolve({ originalName, name: originalName, blob, dataUrl: url, oldSize: blob.size, newSize: blob.size });
                };
                img.src = url;
            });
        }


        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const statusMsg = document.getElementById('statusMsg');
        const resultSection = document.getElementById('resultSection');
        const imagePathInput = document.getElementById('imagePath');
        const pathWarning = document.getElementById('pathWarning');
        const fileInfoArea = document.getElementById('fileInfoArea');
        const currentFileName = document.getElementById('currentFileName');
        const reprocessBtn = document.getElementById('reprocessBtn');

        reprocessBtn.addEventListener('click', () => { if (currentLoadedFile) handleFile(currentLoadedFile); });
        imagePathInput.addEventListener('input', (e) => {
            const val = e.target.value.trim();
            if (val !== '' && !val.startsWith('/') && !val.startsWith('http') && !val.startsWith('.')) pathWarning.classList.remove('hidden');
            else pathWarning.classList.add('hidden');
        });

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => { if (e.target.files.length) handleFile(e.target.files[0]); });

        async function handleFile(file) {
            currentLoadedFile = file;
            currentFileName.textContent = file.name;
            fileInfoArea.classList.remove('hidden');
            const fileNameLower = file.name.toLowerCase();
            if (!fileNameLower.endsWith('.zip') && !fileNameLower.endsWith('.html') && !fileNameLower.endsWith('.htm')) {
                showStatus('errNotZip', 'text-red-600');
                return;
            }
            showStatus('parsing', 'text-blue-600');
            resultSection.classList.add('hidden');
            globalProcessedImages = [];
            
            try {
                let htmlContent = '';
                let maxLen = 0;
                let allImages = []; // 强力图片雷达，跨越所有 ZIP 层级收集资源
                
                if (fileNameLower.endsWith('.zip')) {
                    const zip = new JSZip();
                    const loadedZip = await zip.loadAsync(file);
                    
                    // 递归穿透寻找HTML和图片（彻底解决 Notion 套娃导出的找图失败问题）
                    async function searchZip(currentZip) {
                        const keys = Object.keys(currentZip.files);
                        for (const key of keys) {
                            const entry = currentZip.files[key];
                            if (entry.dir) continue;
                            
                            const lowerKey = key.toLowerCase();
                            if (lowerKey.includes('__macosx') || key.split('/').pop().startsWith('.')) continue;

                            if (lowerKey.endsWith('.zip')) {
                                try {
                                    const nestedBlob = await entry.async("blob");
                                    const nestedZip = await JSZip.loadAsync(nestedBlob);
                                    await searchZip(nestedZip);
                                } catch(e) {}
                            } else if (lowerKey.endsWith('.html') || lowerKey.endsWith('.htm')) {
                                const content = await entry.async("string");
                                if (content.length > maxLen) {
                                    maxLen = content.length;
                                    htmlContent = content;
                                }
                            } else if (lowerKey.match(/\.(png|jpe?g|gif|webp)$/i)) {
                                const blob = await entry.async("blob");
                                allImages.push({ key, blob });
                            }
                        }
                    }
                    await searchZip(loadedZip);

                    // 启动极速图片压缩流水线
                    if (allImages.length > 0) {
                        showStatus('compressing', 'text-indigo-600');
                        for (const imgObj of allImages) {
                            const originalName = imgObj.key.split('/').pop();
                            const compressedData = await compressImageToWebP(imgObj.blob, decodeURIComponent(originalName));
                            globalProcessedImages.push(compressedData);
                        }
                    }

                } else {
                    htmlContent = await file.text();
                }

                if (!htmlContent) {
                    showStatus('errNoHtmlTitle', 'text-red-600');
                    return;

                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlContent, "text/html");

                let rawPath = imagePathInput.value.trim() || '/my_blogs/';
                
                if (!rawPath.startsWith('/') && !rawPath.startsWith('http') && !rawPath.startsWith('.')) rawPath = '/' + rawPath;
                const finalPrefix = rawPath.endsWith('/') ? rawPath : rawPath + '/';
                
                // 终极加速链接模板：利用 GitHub Pages 自带的全球节点，杜绝 302 跳转
                const cdnBaseUrl = `https://${githubUser}.github.io${finalPrefix}`;

                function formatNotionDate(dateStr) {
                    if (!dateStr) return '';
                    let cleanStr = dateStr.replace(/@/g, '').trim();
                    const dateRegex = /(\d{4})[^\d]+(\d{1,2})[^\d]+(\d{1,2})[^\d]+(\d{1,2}:\d{2})/;
                    const match = cleanStr.match(dateRegex);
                    if (match) {
                        return `${match[1]}-${match[2].padStart(2, '0')}-${match[3].padStart(2, '0')} ${match[4]}`;
                    }
                    const parsed = new Date(cleanStr);
                    if (!isNaN(parsed)) {
                        const y = parsed.getFullYear();
                        const m = String(parsed.getMonth() + 1).padStart(2, '0');
                        const d = String(parsed.getDate()).padStart(2, '0');
                        const h = String(parsed.getHours()).padStart(2, '0');
                        const min = String(parsed.getMinutes()).padStart(2, '0');
                        return `${y}-${m}-${d} ${h}:${min}`;
                    }
                    return cleanStr;
                }

                let cTime = '', uTime = '', tags = '';
                let isOriginalEn = false; 
                
                const propTable = doc.querySelector('table.properties');
                if (propTable) {
                    const propText = propTable.textContent.toLowerCase();
                    if (propText.includes('created') || propText.includes('edited') || propText.includes('tags')) {

                    }

                            </div>
                            <div class="flex items-center text-xs text-blue-600 truncate opacity-80 pl-1">
                                <span class="mr-1 text-sm">🔗</span>
                                <span class="truncate" data-i18n-dynamic="pathReplacedItem">${t('pathReplacedItem')}</span>
                            </div>
                        </li>
                    `).join('');
                } else if (replacedImages.length > 0) {
                    previewBtn.classList.add('hidden');
                    downloadBtn.classList.add('hidden');
                    listContainer.innerHTML = replacedImages.map(n => `
                        <li class="flex items-center text-sm p-1.5 bg-white rounded border border-blue-100 shadow-sm">
                            <span class="text-blue-500 mr-2 text-lg">🔗</span>
                            <span class="truncate font-mono">${n}</span>
                        </li>
                    `).join('');
                } else {
                    previewBtn.classList.add('hidden');
                    downloadBtn.classList.add('hidden');
                    listContainer.innerHTML = `<li class="text-gray-400 text-center text-xs p-4 italic">${t('noImages')}</li>`;
                }
                
                showStatus('success', 'text-green-600');
                resultSection.classList.remove('hidden');
                setTimeout(() => resultSection.classList.add('opacity-100'), 50);
            } catch (e) { console.error(e); showStatus('errParse', 'text-red-600'); }
        }

        function showStatus(k, c) { statusMsg.innerHTML = t(k); statusMsg.className = `mt-4 text-center text-sm font-medium ${c}`; statusMsg.classList.remove('hidden'); }
        document.getElementById('copyBtn').addEventListener('click', function() { const area = document.getElementById('outputHtml'); area.select(); document.execCommand('copy'); const originalText = this.innerHTML; this.innerHTML = "✅ " + t('copied').split('！')[0]; this.classList.add('bg-green-100', 'text-green-700'); setTimeout(() => { this.innerHTML = originalText; this.classList.remove('bg-green-100', 'text-green-700'); }, 2000); });
        document.getElementById('previewBtn').addEventListener('click', function() { const htmlContent = document.getElementById('outputHtml').value; if (!htmlContent) return; const parser = new DOMParser(); const doc = parser.parseFromString(htmlContent, "text/html"); doc.querySelectorAll('img').forEach(img => { const src = img.getAttribute('src'); if (src && !src.startsWith('http') && !src.startsWith('data:')) { const msg = t('pathUpdated') + src; const svgStr = `<svg xmlns='http://www.w3.org/2000/svg' width='100%' height='100' style='background:#f3f4f6; border: 2px dashed #10b981;'><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='12px' fill='#047857'>${msg}</text></svg>`; img.setAttribute('src', 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr)); if (img.parentElement.tagName === 'A') { img.parentElement.removeAttribute('href'); img.parentElement.style.cursor = 'default'; } } }); const blob = new Blob(["<!DOCTYPE html>\n" + doc.documentElement.outerHTML], { type: 'text/html;charset=utf-8' }); window.open(URL.createObjectURL(blob), '_blank'); });
    </script>
</body>
</html>
